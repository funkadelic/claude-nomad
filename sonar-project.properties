# SonarCloud project configuration for claude-nomad.

# Project identification
sonar.projectKey=funkadelic_claude-nomad
sonar.organization=funkadelic

# Project metadata
sonar.projectName=claude-nomad
sonar.projectVersion=0.8.0

# Source code location. Tests are colocated alongside source (src/**/*.test.ts),
# so sonar.tests points at the same root and sonar.test.inclusions narrows it.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts

# Exclude test files from duplication detection.
sonar.cpd.exclusions=src/**/*.test.ts

# Coverage report (lcov emitted by vitest via npm run coverage).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
