# SonarCloud project configuration for claude-nomad.

# Project identification
sonar.projectKey=funkadelic_claude-nomad
sonar.organization=funkadelic

# Project metadata
sonar.projectName=claude-nomad
# sonar.projectVersion is injected at scan time via -Dsonar.projectVersion,
# sourced from package.json (the single version of record, bumped by
# release-please), so it never goes stale here. See .github/workflows/tests.yml.

# Source code location. Tests are colocated alongside source (src/**/*.test.ts)
# and test-helper infra (src/**/*.test-helpers*.ts); sonar.tests points at the
# same root and sonar.test.inclusions narrows it to both. Classifying the
# helpers as test code (not uncovered main source) keeps Sonar's coverage
# denominator aligned with vitest, which excludes the same files from the lcov.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test-helpers*.ts

# Exclude test files and test-helper infra from duplication detection.
sonar.cpd.exclusions=src/**/*.test.ts,src/**/*.test-helpers*.ts

# Coverage report (lcov emitted by vitest via npm run coverage).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude the argv entry point from coverage to match vitest's coverage.exclude
# (its dispatch is covered behaviorally by each cmd* function's own tests).
sonar.coverage.exclusions=src/nomad.ts

# Encoding
sonar.sourceEncoding=UTF-8
