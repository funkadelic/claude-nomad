name: Lint
permissions:
  contents: read

on:
  # No `push: branches: [main]` trigger: pre-commit hook (lint-staged) +
  # PR-time lint already cover every change. A post-merge re-lint of the
  # same code is duplicate work. `workflow_dispatch` lets us re-run manually
  # if branch-protection bypass ever lands something on main unscanned.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to the install.sh runtime floor (22.22.1+) so the typecheck
          # step exercises the same TS type-stripping rules that production
          # hosts use. `@types/node` is also pinned to 22 majors via
          # .github/dependabot.yml; running tsc on a newer Node would mask
          # API drift that only manifests on the floor.
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier (check)
        run: npm run format:check

      - name: Markdownlint
        run: npm run lint:md
