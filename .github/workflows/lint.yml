name: Lint
permissions:
  contents: read

on:
  # No `push: branches: [main]` trigger: pre-commit hook (lint-staged) +
  # PR-time lint already cover every change. A post-merge re-lint of the
  # same code is duplicate work. `workflow_dispatch` lets us re-run manually
  # if branch-protection bypass ever lands something on main unscanned.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier (check)
        run: npm run format:check
