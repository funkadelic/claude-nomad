name: Settings schema drift

# Weekly check that src/settings-keys.ts SCHEMA_KEYS still matches the official
# Claude Code settings JSON schema. On drift, regenerate the file and open (or
# update) a PR. APP_ONLY_KEYS stays hand-maintained. Gated to the public repo so
# private mirrors never run it (they receive updates via `nomad update`).

# Downgraded from contents/pull-requests write because the drift PR is now
# authored by the funkadelic-release-bot GitHub App via
# actions/create-github-app-token. The default GITHUB_TOKEN no longer needs
# write access, and (unlike GITHUB_TOKEN) an App-authored PR triggers the
# required CI workflows instead of leaving checks waiting forever.
permissions:
  contents: read

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  drift:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BRANCH: automated/settings-schema-sync
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          # The RELEASE_PLEASE_* secrets hold the funkadelic-release-bot App
          # credentials (the same App that authors the release-please PRs).
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Persist the App token so the branch push is authored by the App and
          # its synchronize events also trigger CI.
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Regenerate SCHEMA_KEYS from the live schema
        run: node scripts/sync-settings-keys.ts

      - name: Open or update a PR when SCHEMA_KEYS drifted
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          if git diff --quiet -- src/settings-keys.ts; then
            echo "No settings schema drift."
            exit 0
          fi
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          git add src/settings-keys.ts
          git commit -m "chore(doctor): sync settings schema keys"
          git push --force-with-lease origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore(doctor): sync settings schema keys" \
              --body "Automated: the Claude Code settings schema changed. SCHEMA_KEYS in \`src/settings-keys.ts\` was regenerated to match. Review the added/removed keys; APP_ONLY_KEYS is unchanged."
          else
            echo "PR for $BRANCH already open; force-push updated it."
          fi
