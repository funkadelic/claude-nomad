name: Tests
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded in-progress runs for PRs and manual dispatches, but never
  # for push:main. A push:main run uploads the coverage baseline Codecov diffs
  # every PR against; cancelling it (e.g. a release PR squashed in right behind
  # a feature PR, sharing the refs/heads/main group) leaves main with no base
  # report and silently stops Codecov from posting on subsequent PRs. push:main
  # runs instead queue and all complete.
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Bracket the supported range: 22.x covers the install.sh minimum
        # (22.22.1+), 24.x is current LTS. If the floor moves, bump both.
        node-version: ['22', '24']
    env:
      # Surfaced at job level so the SonarCloud step's `if:` can detect
      # an unset secret (e.g. on fork PRs) and skip cleanly.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history: SonarCloud needs it for blame attribution
          # and new-code metrics.
          fetch-depth: 0

      # Single gate step. Sets `skip=true` when (a) the post-merge push:main
      # is a release-please bookkeeping commit (the source has already passed
      # CI on its contributing PR), (b) the changeset only touches docs
      # (*.md, LICENSE), or (c) the PR head branch is a release-please branch
      # from this same repo (the PR only bumps version/changelog/manifest; its
      # source rolled up from PRs that already passed CI). The same-repo guard
      # matters: a fork PR can name its branch `release-please--*` to spoof the
      # prefix, but cannot make its head repo equal this one, so the skip never
      # fires for forks. Untrusted inputs (head_commit.message, head.ref, SHAs)
      # are passed via env: so they only enter the shell as quoted vars.
      - name: Decide whether to run heavy steps
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] && [ "${HEAD_MSG#chore(main): release}" != "$HEAD_MSG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-please commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ] && [ "${PR_HEAD_REF#release-please--}" != "$PR_HEAD_REF" ] && [ "$PR_HEAD_REPO" = "$REPO" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-please PR branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$EVENT_NAME" in
            pull_request) BASE="$PR_BASE"; HEAD="$PR_HEAD" ;;
            push)         BASE="$PUSH_BEFORE"; HEAD="$PUSH_AFTER" ;;
            *)            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          # New-branch initial push lacks a parent SHA; run defensively.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" | grep -qvE '\.md$|^LICENSE$'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=docs-only changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node ${{ matrix.node-version }}
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Catch the release-please-vs-`npm install` drift class: release-please
      # bumps `package.json` (version, engines, bin, license, deps location)
      # but only emits a minimal lockfile shape change, leaving metadata
      # rollups stale. `npm ci` tolerates that drift; `--package-lock-only`
      # regenerates the lockfile against the manifest without touching
      # node_modules, then the diff assertion fails the PR before merge.
      # Single node version since lockfile is one file; matches the SonarCloud
      # gating pattern below.
      - name: Verify lockfile in sync with manifest
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && matrix.node-version == '24' }}
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --exit-code package-lock.json

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Install gitleaks
        if: steps.gate.outputs.skip != 'true'
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run tests with coverage
        if: steps.gate.outputs.skip != 'true'
        run: npm run coverage

      # Source sonar.projectVersion from package.json (bumped by release-please)
      # so the Sonar analysis version stays current without a hardcoded value.
      - name: Resolve project version
        id: pkgver
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && env.SONAR_TOKEN != '' && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: SonarCloud scan
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && env.SONAR_TOKEN != '' && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8
        with:
          args: -Dsonar.projectVersion=${{ steps.pkgver.outputs.version }}
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Upload coverage to Codecov
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
