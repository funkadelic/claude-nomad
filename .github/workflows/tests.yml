name: Tests
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Bracket the supported range: 22.x covers the install.sh minimum
        # (22.22.1+), 24.x is current LTS. If the floor moves, bump both.
        node-version: ['22', '24']
    env:
      # Surfaced at job level so the SonarCloud step's `if:` can detect
      # an unset secret (e.g. on fork PRs) and skip cleanly.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history: SonarCloud needs it for blame attribution
          # and new-code metrics.
          fetch-depth: 0

      # Single gate step. Sets `skip=true` when (a) the post-merge push:main
      # is a release-please bookkeeping commit (the source has already passed
      # CI on its contributing PR), or (b) the changeset only touches docs
      # (*.md, LICENSE). Untrusted inputs (head_commit.message, SHAs) are
      # passed via env: so they only enter the shell as quoted vars.
      - name: Decide whether to run heavy steps
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] && [ "${HEAD_MSG#chore(main): release}" != "$HEAD_MSG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-please commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$EVENT_NAME" in
            pull_request) BASE="$PR_BASE"; HEAD="$PR_HEAD" ;;
            push)         BASE="$PUSH_BEFORE"; HEAD="$PUSH_AFTER" ;;
            *)            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          # New-branch initial push lacks a parent SHA; run defensively.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" | grep -qvE '\.md$|^LICENSE$'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=docs-only changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node ${{ matrix.node-version }}
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Catch the release-please-vs-`npm install` drift class: release-please
      # bumps `package.json` (version, engines, bin, license, deps location)
      # but only emits a minimal lockfile shape change, leaving metadata
      # rollups stale. `npm ci` tolerates that drift; `--package-lock-only`
      # regenerates the lockfile against the manifest without touching
      # node_modules, then the diff assertion fails the PR before merge.
      # Single node version since lockfile is one file; matches the SonarCloud
      # gating pattern below.
      - name: Verify lockfile in sync with manifest
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && matrix.node-version == '24' }}
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --exit-code package-lock.json

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Install gitleaks
        if: steps.gate.outputs.skip != 'true'
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run tests with coverage
        if: steps.gate.outputs.skip != 'true'
        run: npm run coverage

      - name: SonarCloud scan
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && env.SONAR_TOKEN != '' && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Upload coverage to Codecov
        if: >-
          ${{ steps.gate.outputs.skip != 'true'
          && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
