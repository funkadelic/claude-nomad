name: Tests
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Bracket the supported range: 22.x covers the install.sh minimum
        # (22.22.1+), 24.x is current LTS. If the floor moves, bump both.
        node-version: ['22', '24']
    env:
      # Surfaced at job level so the SonarCloud step's `if:` can detect
      # an unset secret (e.g. on fork PRs) and skip cleanly.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history: SonarCloud needs it for blame attribution
          # and new-code metrics.
          fetch-depth: 0

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run tests with coverage
        run: npm run coverage

      - name: SonarCloud scan
        if: >-
          ${{ env.SONAR_TOKEN != '' && matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Upload coverage to Codecov
        if: >-
          ${{ matrix.node-version == '24'
          && !contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
