name: release-please

on:
  push:
    branches:
      - main
  # Manual trigger so the release PR can be reopened when a push event is
  # missed (e.g. a transient 502 during a merge creates the commit on main
  # but never fires the push webhook). Recover with: gh workflow run release-please.yml
  workflow_dispatch:

# Downgraded from `contents: write` / `pull-requests: write` because the
# release PR is now authored by the GitHub App via actions/create-github-app-token.
# The default GITHUB_TOKEN no longer needs write access.
permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    # Restrict to the default branch so a manual workflow_dispatch cannot run
    # release-please against an arbitrary ref. The push trigger is already
    # branch-scoped to main, so this is a no-op there and a guard for dispatch.
    if: ${{ !github.event.repository.private && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # Authenticating release-please via the App (not GITHUB_TOKEN) so
          # PRs it creates trigger the required CI workflows. GITHUB_TOKEN-
          # authored PRs are skipped by GitHub's anti-recursion safeguard,
          # which leaves required checks in 'waiting' forever and blocks the
          # merge under branch protection.
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
