name: CodeQL
permissions:
  contents: read

on:
  # No `push: branches: [main]` trigger: PR runs cover all merged content,
  # and the weekly schedule provides drift coverage. A post-merge re-scan of
  # the same code is duplicate work.
  pull_request:
    branches: [main]
  schedule:
    # Saturday 06:17 UTC. Off-peak; minute offset to dodge GitHub's
    # documented minute-0 cron pile-up.
    - cron: '17 6 * * 6'

jobs:
  analyze:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # Need diff base for the docs-only gate below.
          fetch-depth: 0

      # Skip CodeQL on docs-only PRs (no analyzable code changed). SHAs flow
      # through env: to stay out of shell expression context. The scheduled
      # run has no PR context and falls through to skip=false.
      - name: Decide whether to run heavy steps
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$PR_BASE" ] || [ "$PR_BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$PR_BASE" "$PR_HEAD" | grep -qvE '\.md$|^LICENSE$'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=docs-only changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.gate.outputs.skip != 'true'
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: ${{ matrix.language }}
          # No build step needed for JS/TS analysis; declare explicitly
          # to silence the v3 deprecation warning.
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL analysis
        if: steps.gate.outputs.skip != 'true'
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: '/language:${{ matrix.language }}'
