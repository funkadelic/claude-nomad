name: CodeQL
permissions:
  contents: read

on:
  # No `push: branches: [main]` trigger: PR runs cover all merged content,
  # and the weekly schedule provides drift coverage. A post-merge re-scan of
  # the same code is duplicate work.
  pull_request:
    branches: [main]
  schedule:
    # Saturday 06:17 UTC. Off-peak; minute offset to dodge GitHub's
    # documented minute-0 cron pile-up.
    - cron: '17 6 * * 6'

jobs:
  analyze:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Need diff base for the docs-only gate below.
          fetch-depth: 0

      # Skip CodeQL when (a) the PR head branch is a release-please branch from
      # this same repo (a version/changelog/manifest bump with no analyzable
      # source delta; its source rolled up from PRs that already scanned), or
      # (b) the changeset only touches docs (*.md, LICENSE). The same-repo guard
      # mirrors tests.yml: a fork PR can name its branch release-please--* to
      # spoof the prefix but cannot make its head repo equal this one, so the
      # skip never fires for forks. SHAs and refs flow through env: to stay out
      # of shell expression context. The scheduled run has no PR context and
      # falls through to skip=false.
      - name: Decide whether to run heavy steps
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${PR_HEAD_REF#release-please--}" != "$PR_HEAD_REF" ] && [ "$PR_HEAD_REPO" = "$REPO" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-please PR branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$PR_BASE" ] || [ "$PR_BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$PR_BASE" "$PR_HEAD" | grep -qvE '\.md$|^LICENSE$'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=docs-only changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.gate.outputs.skip != 'true'
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: ${{ matrix.language }}
          # No build step needed for JS/TS analysis; declare explicitly
          # to silence the v3 deprecation warning.
          build-mode: none
          queries: security-and-quality
          # Keep the scanner out of the docs site, matching the docs-site
          # exclusions in sonar-project.properties, eslint.config.js, and
          # codecov.yml.
          config: |
            paths-ignore:
              - docs-site

      - name: Perform CodeQL analysis
        if: steps.gate.outputs.skip != 'true'
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: '/language:${{ matrix.language }}'
