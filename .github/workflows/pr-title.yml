name: PR Title
permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types must match commitlint.config.js / CLAUDE.md. Squash-merge
          # uses the PR title as the commit subject, so this is the
          # server-side gate that keeps main's history conventional.
          # `deps` / `deps-dev` are non-standard but Dependabot emits them
          # when configured to do so (see .github/dependabot.yml).
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            build
            ci
            perf
            style
            revert
            deps
            deps-dev
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
