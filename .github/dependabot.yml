version: 2
updates:
  # npm: keep prod + dev deps current. Group dev deps so we get one PR
  # per cadence instead of N small ones. Prefixes route through
  # release-please's `deps` / `deps-dev` types so updates land under
  # the CHANGELOG's "Dependencies" section.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-dependencies:
        dependency-type: production
        update-types: [patch]
    commit-message:
      # No `include: scope` -- the prefix already encodes dep-type, and
      # `include: scope` would produce redundant titles like
      # `deps(deps): bump foo` / `deps-dev(deps-dev): bump foo`.
      prefix: deps
      prefix-development: deps-dev

  # github-actions: third-party action major bumps land here. No
  # dev/prod distinction; everything is `deps`.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
