# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration. docs-site/ is the generated-content Starlight
# site; review effort belongs on the CLI source, mirroring the exclusions in
# sonar-project.properties, eslint.config.js, and .prettierignore.
reviews:
  path_filters:
    - '!docs-site/**'
